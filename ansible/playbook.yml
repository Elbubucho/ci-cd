---
- name: Déploiement de la stack applicative
  hosts: app_hosts
  become: true

  vars:
    project_dir: "/home/ubuntu/app-stack"
    # Toutes ces vars sont passées via --extra-vars depuis le workflow GitHub
    registry_host: "{{ lookup('env', 'REGISTRY_HOST') }}"
    registry_user: "{{ lookup('env', 'REGISTRY_USER') }}"
    registry_password: "{{ lookup('env', 'REGISTRY_PASSWORD') }}"
    mysql_root_password: "{{ lookup('env', 'MYSQL_ROOT_PASSWORD') }}"
    mysql_user: "{{ lookup('env', 'MYSQL_USER') }}"
    mysql_database: "{{ lookup('env', 'MYSQL_DATABASE') }}"

  tasks:
    - name: Installation de Docker et des dépendances
      apt:
        update_cache: yes
        name:
          - docker.io
          - docker-compose-v2
        state: present

    - name: Démarrage et activation du service Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Ajout de l'utilisateur ubuntu au groupe docker
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Création des dossiers projet
      file:
        path: "{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'
      loop:
        - "{{ project_dir }}"
        - "{{ project_dir }}/sqlfiles"

    - name: Copie du docker-compose.prod.yml
      copy:
        src: ../docker-compose.prod.yml
        dest: "{{ project_dir }}/docker-compose.yml"
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Copie des migrations SQL
      copy:
        src: "../sqlfiles/"
        dest: "{{ project_dir }}/sqlfiles/"
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Génération du fichier .env
      copy:
        dest: "{{ project_dir }}/.env"
        owner: ubuntu
        group: ubuntu
        mode: '0600'
        content: |
          REGISTRY_HOST={{ registry_host }}
          MYSQL_ROOT_PASSWORD={{ mysql_root_password }}
          MYSQL_USER={{ mysql_user }}
          MYSQL_DATABASE={{ mysql_database }}

    - name: Configurer Docker pour accepter le registre self-signed
      copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "insecure-registries": ["{{ registry_host }}"]
          }
        mode: '0644'

    - name: Redémarrer Docker pour appliquer la config
      service:
        name: docker
        state: restarted

    - name: Authentification au registre Docker privé
      command: >
        docker login {{ registry_host }}
        -u {{ registry_user }}
        -p {{ registry_password }}

    - name: Pull des dernières images depuis le registre
      command: docker compose pull
      args:
        chdir: "{{ project_dir }}"

    - name: Lancement de la stack applicative
      command: docker compose up -d
      args:
        chdir: "{{ project_dir }}"
      register: up_result
      failed_when: false

    - name: Pause pour laisser la stack se stabiliser
      pause:
        seconds: 30

    - name: Statut des conteneurs
      command: docker compose ps -a
      args:
        chdir: "{{ project_dir }}"
      register: compose_ps_output

    - name: Affichage du statut
      debug:
        msg: "{{ compose_ps_output.stdout_lines }}"

    - name: Logs db (200 lignes)
      command: docker compose logs db --tail=200
      args:
        chdir: "{{ project_dir }}"
      register: db_logs
      failed_when: false

    - name: Affichage logs db
      debug:
        msg: "{{ db_logs.stdout_lines }}"

    - name: Logs backend (200 lignes)
      command: docker compose logs backend --tail=200
      args:
        chdir: "{{ project_dir }}"
      register: backend_logs
      failed_when: false

    - name: Affichage logs backend
      debug:
        msg: "{{ backend_logs.stdout_lines }}"

    - name: Échec si docker compose up a planté
      fail:
        msg: "docker compose up failed: {{ up_result.stderr }}"
      when: up_result.rc != 0
