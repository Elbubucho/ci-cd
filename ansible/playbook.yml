---
- name: Déploiement de la stack applicative
  hosts: app_hosts
  become: true

  vars:
    project_dir: "/home/ubuntu/app-stack"
    registry_host: "{{ lookup('env', 'REGISTRY_HOST') }}"
    registry_user: "{{ lookup('env', 'REGISTRY_USER') }}"
    registry_password: "{{ lookup('env', 'REGISTRY_PASSWORD') }}"
    mysql_root_password: "{{ lookup('env', 'MYSQL_ROOT_PASSWORD') }}"
    mysql_user: "{{ lookup('env', 'MYSQL_USER') }}"
    mysql_database: "{{ lookup('env', 'MYSQL_DATABASE') }}"

  tasks:
    - name: Installer Docker
      apt:
        update_cache: yes
        name:
          - docker.io
          - docker-compose-v2
        state: present

    - name: Démarrer et activer Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Configurer Docker pour le registre self-signed
      copy:
        dest: /etc/docker/daemon.json
        mode: '0644'
        content: |
          {
            "insecure-registries": ["{{ registry_host }}"]
          }

    - name: Redémarrer Docker pour appliquer la config
      service:
        name: docker
        state: restarted

    - name: Ajouter ubuntu au groupe docker
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Créer les dossiers projet
      file:
        path: "{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'
      loop:
        - "{{ project_dir }}"
        - "{{ project_dir }}/sqlfiles"

    - name: Copier docker-compose.prod.yml
      copy:
        src: ../docker-compose.prod.yml
        dest: "{{ project_dir }}/docker-compose.yml"
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Copier les migrations SQL
      copy:
        src: ../sqlfiles/
        dest: "{{ project_dir }}/sqlfiles/"
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Générer le fichier .env
      copy:
        dest: "{{ project_dir }}/.env"
        owner: ubuntu
        group: ubuntu
        mode: '0600'
        content: |
          REGISTRY_HOST={{ registry_host }}
          MYSQL_ROOT_PASSWORD={{ mysql_root_password }}
          MYSQL_USER={{ mysql_user }}
          MYSQL_DATABASE={{ mysql_database }}

    - name: Authentification au registre Docker privé
      command: docker login {{ registry_host }} -u {{ registry_user }} -p {{ registry_password }}

    - name: Pull des images
      command: docker compose pull
      args:
        chdir: "{{ project_dir }}"

    - name: Démarrer la base de données seule
      command: docker compose up -d db
      args:
        chdir: "{{ project_dir }}"

    - name: Attendre que la db soit healthy
      command: docker compose ps --format '{% raw %}{{.Health}}{% endraw %}' db
      args:
        chdir: "{{ project_dir }}"
      register: db_health
      until: db_health.stdout == "healthy"
      retries: 30
      delay: 10

    - name: Démarrer le reste de la stack
      command: docker compose up -d
      args:
        chdir: "{{ project_dir }}"

    - name: Pause pour stabilisation
      pause:
        seconds: 15

    - name: Statut des conteneurs
      command: docker compose ps -a
      args:
        chdir: "{{ project_dir }}"
      register: compose_ps

    - name: Affichage du statut
      debug:
        msg: "{{ compose_ps.stdout_lines }}"
