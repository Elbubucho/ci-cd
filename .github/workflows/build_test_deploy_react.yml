name: Build, Test and Deploy React Application

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'

      - name: npm ci,test, generate doc and build
        run: |
          npm ci
          npm test
          npm run jsdoc
          npm run build --if-present
          
          
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: 
            ${{ secrets.CODECOV_TOKEN }}

      - name: build and publish package on NPM 📦
        run: |
          npm run build-npm-ci
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          REMOTE_VERSION=$(npm view integration-test-valsala version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL_VERSION" != "$REMOTE_VERSION" ]; then
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build
          if-no-files-found: error

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    needs: build_test
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
  build-docker:
    runs-on: ubuntu-latest
    needs: build_test
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend -f DockerfileReact .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend

      - name: Build and push backend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/backend -f server/Dockerfile ./server
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend

  test-docker:
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install dependencies
        run: npm ci

      - name: Start services
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
        run: docker compose up -d --build

      - name: List containers
        run: docker ps

      - name: Wait for services to be healthy
        run: sleep 60

      - name: Check db health
        run: docker inspect --format "{{json .State.Health.Status }}" ci-cd-db-1 | jq '. == "healthy"'

      - name: Check backend health
        run: docker inspect --format "{{json .State.Health.Status }}" ci-cd-backend-1 | jq '. == "healthy"'

      - name: Check adminer health
        run: docker inspect --format "{{json .State.Health.Status }}" ci-cd-adminer-1 | jq '. == "healthy"'

      - name: Cypress run
        uses: cypress-io/github-action@v6

      - name: Stop services
        if: always()
        run: docker compose down