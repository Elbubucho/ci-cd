services:
  db:
    image: mysql:9.7
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    volumes:
      - db-data:/var/lib/mysql
      - ./sqlfiles:/docker-entrypoint-initdb.d
    healthcheck:
      test: "mysql --user=root --password=$$MYSQL_ROOT_PASSWORD --execute \"USE $$MYSQL_DATABASE; SELECT 1;\" || exit 1"
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 120s

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"

  backend:
    image: ${REGISTRY_HOST}/backend:latest
    restart: always
    ports:
      - "8000:8000"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_HOST=db
    depends_on:
      db:
        condition: service_healthy

  react:
    image: ${REGISTRY_HOST}/frontend:latest
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db-data:
