---
- name: Déploiement d'un Registry Docker Sécurisé
  hosts: registry_hosts
  become: true
  vars:
    project_dir: "/home/ubuntu/registry-stack"
    # On récupère l'IP publique automatiquement via les facts Ansible
    public_ip: "{{ ansible_host }}"
    # À passer via --extra-vars ou variables d'environnement
    registry_user: "{{ lookup('env', 'REGISTRY_USER') | default('admin', true) }}"
    registry_password: "{{ lookup('env', 'REGISTRY_PASSWORD') }}"

  tasks:
    - name: Installation des paquets
      apt:
        update_cache: yes
        name:
          - docker.io
          - docker-compose-v2
          - apache2-utils  # Pour htpasswd
          - python3-passlib
        state: present

    - name: Ajout de l'utilisateur ubuntu au groupe docker
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Création des dossiers
      file:
        path: "{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'
      loop:
        - "{{ project_dir }}"
        - "{{ project_dir }}/auth"
        - "{{ project_dir }}/data"
        - "{{ project_dir }}/ssl"
        - "{{ project_dir }}/conf"

    - name: Génération du certificat SSL auto-signé (avec SAN)
      command: >
        openssl req -x509 -nodes -days 365
        -newkey rsa:2048
        -keyout {{ project_dir }}/ssl/registry.key
        -out {{ project_dir }}/ssl/registry.crt
        -subj "/CN={{ public_ip }}"
        -addext "subjectAltName=IP:{{ public_ip }}"

    - name: Génération du mot de passe pour le registre
      htpasswd:
        path: "{{ project_dir }}/auth/registry.password"
        name: "{{ registry_user }}"
        password: "{{ registry_password }}"
        owner: ubuntu
        group: ubuntu
        mode: 0640
        crypt_scheme: bcrypt

    - name: Copie de la configuration Nginx
      template:
        src: registry.conf
        dest: "{{ project_dir }}/conf/registry.conf"
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Copie du docker-compose.yml
      template:
        src: docker-compose.yml
        dest: "{{ project_dir }}/docker-compose.yml"
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Stop stack
      command: docker compose stop
      args:
        chdir: "{{ project_dir }}"

    - name: Démarrage de la stack
      command: docker compose up --force-recreate -d
      args:
        chdir: "{{ project_dir }}"

    - name: Récupération du statut des conteneurs
      command: docker compose ps
      args:
        chdir: "{{ project_dir }}"
      register: compose_ps_output

    - name: Affichage du statut final dans la console
      debug:
        msg: "{{ compose_ps_output.stdout_lines }}"